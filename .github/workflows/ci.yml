name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python (lint, type, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Ruff (format check)
        run: ruff format --check src tests

      - name: Mypy (type check)
        run: mypy

      - name: Pytest
        run: pytest -q

      - name: Audit gate (fail on HIGH)
        run: |
          cloudguard audit \
            --snapshot data/sample/account_snapshot.json \
            --cloudtrail data/sample/cloudtrail_events.jsonl \
            --format json --output out/report.json --fail-on HIGH || \
          echo "::warning::cloudguard found findings at or above HIGH (expected for the sample account)"

  terraform:
    name: Terraform (fmt, validate, scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate (modules + env)
        run: |
          for dir in terraform/modules/iam terraform/modules/waf terraform/environments/prod; do
            echo "== validating $dir =="
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

      - name: tfsec (security scan)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: true
